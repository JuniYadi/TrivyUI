services:
  mysql-test:
    image: mysql:8
    container_name: trivyui-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: trivyui_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ptest --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-test:
    image: postgres:16
    container_name: trivyui-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: trivyui_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trivyui_test"]
      interval: 5s
      timeout: 5s
      retries: 20
