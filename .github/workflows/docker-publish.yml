name: Docker Publish GHCR

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: juniyadi/trivy-ui

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.value }}
      major: ${{ steps.version.outputs.major }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      labels: ${{ steps.meta.outputs.labels }}
      image_base: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse semantic version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${VERSION#v}"
          MAJOR="${CLEAN_VERSION%%.*}"
          MAJOR_MINOR="$(echo "${CLEAN_VERSION}" | cut -d. -f1,2)"

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=v${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "major_minor=v${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-amd64:
    name: Build amd64
    runs-on: ubuntu-24.04
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.version }}-amd64
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=gha,scope=trivy-ui-amd64
          cache-to: type=gha,scope=trivy-ui-amd64,mode=max

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.version }}-arm64
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=gha,scope=trivy-ui-arm64
          cache-to: type=gha,scope=trivy-ui-arm64,mode=max

  manifest:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-amd64
      - build-arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        shell: bash
        run: |
          IMAGE_BASE="${{ needs.prepare.outputs.image_base }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          MAJOR_MINOR="${{ needs.prepare.outputs.major_minor }}"
          MAJOR="${{ needs.prepare.outputs.major }}"

          SOURCE_AMD64="${IMAGE_BASE}:${VERSION}-amd64"
          SOURCE_ARM64="${IMAGE_BASE}:${VERSION}-arm64"

          docker buildx imagetools create --tag "${IMAGE_BASE}:${VERSION}" "${SOURCE_AMD64}" "${SOURCE_ARM64}"
          docker buildx imagetools create --tag "${IMAGE_BASE}:${MAJOR_MINOR}" "${SOURCE_AMD64}" "${SOURCE_ARM64}"
          docker buildx imagetools create --tag "${IMAGE_BASE}:${MAJOR}" "${SOURCE_AMD64}" "${SOURCE_ARM64}"
          docker buildx imagetools create --tag "${IMAGE_BASE}:latest" "${SOURCE_AMD64}" "${SOURCE_ARM64}"

      - name: Verify manifest
        run: docker buildx imagetools inspect "${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.version }}"
